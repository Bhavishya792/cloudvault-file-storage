<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for(
            'static',
            filename='css/style.css'
        ) }}">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>
                CloudVault
            </h1>

            <p>
                Login to your account
            </p>

            {% with messages = get_flashed_messages() %}

            {% if messages %}

            <div class="flash">

                {{ messages[-1] }}

            </div>

            {% endif %}

            {% endwith %}
            <form method="POST">

                <input type="text" name="identifier" placeholder="Username or Email" class="form-input" required>

                <input type="password" name="password" placeholder="Password" class="form-input" required>

                <button type="submit">
                    Login
                </button>

            </form>

            <p>

                Don't have an account?

                <a href="/register">
                    Register
                </a>

            </p>

        </div>

    </div>

</body>

</html>
