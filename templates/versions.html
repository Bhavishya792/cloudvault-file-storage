<!DOCTYPE html>
<html>

<head>

    <title>Version History</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<div class="container">

    <div class="topbar">

        <div>

            <h1>

                Version History

            </h1>

            <p class="tagline">

                {{ filename }}

            </p>

        </div>

        <a
            href="{{ url_for('dashboard') }}"
            class="logout-btn"
        >

            Dashboard

        </a>

    </div>

    {% if versions %}

        {% for file in versions %}

            <div
                style="
                background:var(--surface);
                border:1px solid var(--border);
                border-radius:18px;
                padding:22px;
                margin-bottom:15px;
                "
            >

                <div
                    style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                    flex-wrap:wrap;
                    gap:15px;
                    "
                >

                    <div>

                        <h3>

                            Version {{ file.version }}

                        </h3>

                        <p
                            style="
                            color:var(--muted);
                            margin-top:8px;
                            "
                        >

                            Uploaded:
                            {{ file.uploaded_at.strftime('%d %b %Y %I:%M %p') }}

                        </p>

                    </div>

                    <a
                        href="{{ url_for('download_file', file_id=file.id) }}"
                        class="action-btn"
                    >

                        Download

                    </a>

                </div>

            </div>

        {% endfor %}

    {% endif %}

</div>

</body>

</html>
